# AtCode — Full-Stack Docker Compose
#
# This is a STANDALONE file, completely independent from docker/compose.yaml.
# It builds and runs the entire stack in containers (memgraph, redis, backend, frontend).
#
# Usage:
#   docker compose -f docker/compose.full.yaml up --build -d
#   docker compose -f docker/compose.full.yaml --profile lab up -d lab
#   docker compose -f docker/compose.full.yaml down
#   docker compose -f docker/compose.full.yaml logs -f
#
# Configuration is read from .env (same file as the local workflow).

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  memgraph:
    image: "${DOCKER_IMAGE_PREFIX:-}memgraph/memgraph-mage"
    ports:
      - "${MEMGRAPH_PORT:-7687}:7687"
      - "${MEMGRAPH_HTTP_PORT:-7444}:7444"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  lab:
    image: "${DOCKER_IMAGE_PREFIX:-}memgraph/lab"
    profiles: ["lab"]
    ports:
      - "${LAB_PORT:-3000}:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
    depends_on:
      - memgraph

  redis:
    image: "${DOCKER_IMAGE_PREFIX:-}redis:latest"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "6379:6379"
    volumes:
      - "${REDIS_DATA_DIR:-../data/redis}:/data"
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${API_PORT:-8008}:8008"
    env_file: ../.env
    environment:
      HOME: "/tmp/atcode-home"
      # Override host-level values so containers talk via Docker network
      MEMGRAPH_HOST: memgraph
      MEMGRAPH_PORT: "7687"
      REDIS_URL: redis://redis:6379/0
      API_HOST: "0.0.0.0"
      API_PORT: "8008"
    depends_on:
      memgraph:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Persist project data on the host while keeping source code inside images.
      - "${ATCODE_DATA_DIR:-../data}:/app/data"

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      # Keep the build context limited to frontend/ so large runtime data under
      # the repo root does not slow down `load build context`.
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        API_PORT: "${API_PORT:-8008}"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${PORT:-3007}:3000"
    env_file: ../.env
    environment:
      HOME: "/tmp/atcode-home"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      API_PORT: "${API_PORT:-8008}"
      NEXT_PUBLIC_API_PORT: "${API_PORT:-8008}"
      # Server-side Next.js routes run inside the frontend container, so they
      # must reach FastAPI over the Docker network instead of localhost.
      SERVER_API_URL: "http://backend:8008"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      # Next.js API routes also read and write project data under /app/data.
      - "${ATCODE_DATA_DIR:-../data}:/app/data"
