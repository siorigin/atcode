# AtCode Nginx Configuration
#
# This configuration provides a unified entry point for both frontend and backend,
# eliminating the need for CORS configuration.
#
# Usage:
#   1. Install nginx: sudo apt install nginx
#   2. Copy this config to /etc/nginx/sites-available/atcode
#   3. Create symlink: sudo ln -s /etc/nginx/sites-available/atcode /etc/nginx/sites-enabled/
#   4. Test config: sudo nginx -t
#   5. Restart: sudo systemctl restart nginx
#
# Or run directly: nginx -c /path/to/atcode/scripts/nginx/nginx.conf -p /tmp/nginx

worker_processes auto;
pid /tmp/nginx/nginx.pid;
error_log /tmp/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /tmp/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;
    tcp_nopush on;
    tcp_nodelay on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Upstream servers
    upstream frontend {
        server 127.0.0.1:3007;
    }

    upstream backend {
        server 127.0.0.1:8008;
    }

    # Main server
    server {
        listen 8080;
        server_name localhost;

        # Client body size limit (for file uploads)
        client_max_body_size 10M;

        # Frontend - Next.js dev server or static files
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # WebSocket support for Next.js HMR
            proxy_set_header Connection "upgrade";
        }

        # Backend API - FastAPI
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for streaming responses
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_connect_timeout 3600s;
        }

        # FastAPI docs (optional)
        location /docs {
            proxy_pass http://backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
